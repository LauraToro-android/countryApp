<h1 class="text-2xl">Por región</h1>
<h3 class="text-lg">Seleccione una región</h3>

<section class="row mt-2">
  <div class="flex flex-wrap gap-2">
  <button
    *ngFor="let region of regions"
    class="btn border-t-indigo-950 w-[100px]"
    (click)="selectedRegion.set(region)"
    [class.btn-primary]="selectedRegion() === region">
    {{ region }}
  </button>
</div>

</section>

<div *ngIf="!selectedRegion()" class="mt-4 text-red-600 font-medium">
  Región no válida. Por favor, seleccione una región válida.
</div>

<!-- Lista de países si la región es válida -->
<app-country-list
  *ngIf="selectedRegion()"
  [countries]="countryResource.value()!"
/>
